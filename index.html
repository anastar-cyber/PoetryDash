<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poetry Dash</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0014;
    font-family: 'Crimson Text', serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  #gameContainer {
    position: relative;
    width: 900px;
    max-width: 100vw;
    user-select: none;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
  }

  #progressBar {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 16px;
    overflow: hidden;
  }

  #progressFill {
    height: 100%;
    background: linear-gradient(90deg, #b47aff, #ff8ae2);
    width: 0%;
    transition: width 0.1s;
    border-radius: 2px;
  }

  #scoreDisplay { color: #ffd86b; min-width: 80px; text-align: right; font-size: 12px; }
  #levelLabel { color: #b47aff; min-width: 80px; font-size: 11px; }

  canvas {
    display: block;
    border-radius: 8px;
    border: 1px solid rgba(180,122,255,0.3);
    background: #0d001f;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10,0,20,0.88);
    border-radius: 8px;
    pointer-events: all;
    z-index: 10;
  }

  .overlay-title {
    font-family: 'Orbitron', monospace;
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, #b47aff, #ff8ae2, #ffd86b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    text-align: center;
    line-height: 1.1;
  }

  .overlay-poem {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    margin: 8px 0 28px;
    line-height: 1.7;
    max-width: 420px;
  }

  .overlay-poem span { color: #ffd86b; font-style: normal; }

  .play-btn {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    letter-spacing: 0.12em;
    font-weight: 700;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid #b47aff;
    color: #b47aff;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .play-btn:hover { background: #b47aff; color: #0a0014; }

  #deathPoem {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(255,120,120,0.9);
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.6;
    min-height: 44px;
  }

  #collectedWords {
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: #ffd86b;
    text-align: center;
    margin-bottom: 24px;
    max-width: 380px;
    line-height: 1.6;
    min-height: 20px;
  }

  #instructions {
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    margin-top: 16px;
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="hud">
    <span id="levelLabel">CANTO I</span>
    <div id="progressBar"><div id="progressFill"></div></div>
    <span id="scoreDisplay">WORDS: 0</span>
  </div>
  <canvas id="gameCanvas" width="900" height="360"></canvas>
  <div id="overlay">
    <div class="overlay-title">POETRY DASH</div>
    <div class="overlay-poem">
      Leap through lines of verse,<br>
      collect the <span>golden words</span>,<br>
      dodge the blocks of silence.
    </div>
    <div id="deathPoem"></div>
    <div id="collectedWords"></div>
    <button class="play-btn" id="playBtn">PRESS TO PLAY</button>
    <div id="instructions">Space / Click / Tap to jump &nbsp;·&nbsp; Double jump allowed</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 60;

const LEVELS = [
  {
    name: "CANTO I",
    bg: ['#0d001f','#1a0035'],
    accent: '#b47aff',
    speed: 5.5,
    obstacles: ['silence','void','prose'],
    collectables: ['light','dawn','breath','hope','sing','flow','bloom','rise','spark','grace'],
    poem: ["The cube leaps through","silver lines of verse,","each word a stepping stone."]
  },
  {
    name: "CANTO II",
    bg: ['#001a2a','#001f3a'],
    accent: '#4dd9ff',
    speed: 7,
    obstacles: ['doubt','fear','hush','dull'],
    collectables: ['tide','wave','deep','call','sea','night','dream','soul','mist','burn'],
    poem: ["Through the ship of rhythm","and the storm of meter,","the poet sails on."]
  },
  {
    name: "CANTO III",
    bg: ['#1a0a00','#2a1000'],
    accent: '#ff8a4d',
    speed: 9,
    obstacles: ['ache','loss','grey','still'],
    collectables: ['fire','ash','wild','roar','dark','dusk','blaze','oath','scar','gold'],
    poem: ["At the edge of the stanza,","the word catches itself—","and does not fall."]
  }
];

let state = 'menu';
let level = 0;
let score = 0;
let distance = 0;
let collectedWords = [];
let obstacles = [], collectables = [], particles = [], bgWords = [], bgStars = [];
let deathPoems = [
  "Even Homer nods—\nand the cube falls into\nsilence between stanzas.",
  "The page tears gently.\nA poet's first draft is\nalways returned to.",
  "Mid-verse the voice\ncracked—but the attempt\nwas a kind of music.",
  "Not all lines complete\ntheir arc. Even Keats\nleft odes unfinished.",
  "The rhythm stumbled.\nThe heart, however, kept\nits own perfect time."
];

let player = { x: 100, y: GROUND, w: 36, h: 36, vy: 0, grounded: true, jumps: 0, angle: 0, trail: [] };
let frameId, lastTime = 0;
let groundOffset = 0;

function initGame() {
  score = 0;
  distance = 0;
  collectedWords = [];
  level = 0;
  player = {
    x: 100, y: GROUND,
    w: 36, h: 36,
    vy: 0,
    grounded: true,
    jumps: 0,
    angle: 0,
    trail: []
  };
  obstacles = [];
  collectables = [];
  particles = [];
  bgWords = generateBgWords();
  bgStars = generateStars();
  groundOffset = 0;
  obstacleTimer = 0;
  collectTimer = 0;
}

function generateBgWords() {
  const words = ['iamb','sonnet','verse','rhyme','stanza','meter','ode','lyric','elegy','epic','haiku','couplet','trope','caesura'];
  return Array.from({length: 30}, () => ({
    word: words[Math.floor(Math.random() * words.length)],
    x: Math.random() * W,
    y: Math.random() * (GROUND - 40),
    alpha: Math.random() * 0.06 + 0.02,
    size: Math.random() * 10 + 10,
    speed: Math.random() * 0.3 + 0.1
  }));
}

function generateStars() {
  return Array.from({length: 80}, () => ({
    x: Math.random() * W,
    y: Math.random() * (GROUND - 20),
    r: Math.random() * 1.5 + 0.3,
    alpha: Math.random() * 0.5 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  }));
}

let obstacleTimer = 0, collectTimer = 0;

function spawnObstacle() {
  const lvl = LEVELS[level];
  const types = ['block','tall','double'];
  const type = types[Math.floor(Math.random() * types.length)];
  const word = lvl.obstacles[Math.floor(Math.random() * lvl.obstacles.length)];
  let h = type === 'tall' ? 80 : type === 'double' ? 50 : 40;
  let w = 50 + word.length * 7;
  obstacles.push({
    x: W + 40, y: GROUND - h + 36,
    w, h, word, type,
    glow: 0
  });
}

function spawnCollectable() {
  const lvl = LEVELS[level];
  const word = lvl.collectables[Math.floor(Math.random() * lvl.collectables.length)];
  const x = W + 40;
  const y = GROUND - 80 - Math.random() * 80;
  collectables.push({ x, y, word, collected: false, bob: Math.random() * Math.PI * 2, glow: 0 });
}

function jump() {
  if (state !== 'playing') return;
  if (player.jumps < 2) {
    player.vy = player.jumps === 0 ? -13 : -11;
    player.grounded = false;
    player.jumps++;
    spawnJumpParticles();
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI;
    particles.push({
      x: player.x + player.w/2,
      y: player.y + player.h,
      vx: Math.cos(a) * (Math.random() * 3 + 1) * (Math.random() < 0.5 ? 1 : -1),
      vy: Math.sin(a) * -(Math.random() * 2 + 1),
      life: 1, maxLife: 1,
      color: LEVELS[level].accent,
      size: Math.random() * 4 + 1
    });
  }
}

function spawnCollectParticles(x, y, word) {
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(a) * (Math.random() * 4 + 1),
      vy: Math.sin(a) * (Math.random() * 4 + 1),
      life: 1, maxLife: 1,
      color: '#ffd86b',
      size: Math.random() * 3 + 1,
      word: i === 0 ? word : null
    });
  }
}

function update(dt) {
  const lvl = LEVELS[level];
  const speed = lvl.speed * dt * 60;
  distance += speed;

  groundOffset = (groundOffset + speed) % 40;

  player.vy += 0.65 * dt * 60;
  player.y += player.vy * dt * 60;

  if (player.y >= GROUND) {
    player.y = GROUND;
    player.vy = 0;
    player.grounded = true;
    player.jumps = 0;
  }

  if (!player.grounded) {
    player.angle += 4 * dt * 60;
  } else {
    player.angle = Math.round(player.angle / 90) * 90;
  }

  player.trail.unshift({ x: player.x + player.w/2, y: player.y + player.h/2, angle: player.angle });
  if (player.trail.length > 12) player.trail.pop();

  obstacleTimer -= dt;
  if (obstacleTimer <= 0) {
    spawnObstacle();
    obstacleTimer = 0.9 + Math.random() * 0.8;
  }
  collectTimer -= dt;
  if (collectTimer <= 0) {
    spawnCollectable();
    collectTimer = 1.2 + Math.random() * 1;
  }

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + obstacles[i].w < -60) {
      obstacles.splice(i, 1);
      continue;
    }
    if (rectCollide(player, obstacles[i])) {
      die();
      return;
    }
  }

  for (let i = collectables.length - 1; i >= 0; i--) {
    const c = collectables[i];
    c.x -= speed;
    c.bob += dt * 3;
    c.glow = (Math.sin(c.bob * 2) + 1) / 2;
    if (c.x + 80 < 0) { collectables.splice(i, 1); continue; }
    if (!c.collected && rectCollidePoint(player, c.x, c.y + Math.sin(c.bob) * 5)) {
      c.collected = true;
      score++;
      collectedWords.push(c.word);
      spawnCollectParticles(c.x, c.y, c.word);
      collectables.splice(i, 1);
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.15 * dt * 60;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }

  for (const s of bgStars) {
    s.twinkle += dt * 1.5;
  }

  for (const w of bgWords) {
    w.x -= w.speed * dt * 60;
    if (w.x + 100 < 0) {
      w.x = W + 20;
      w.y = Math.random() * (GROUND - 40);
    }
  }

  const prog = Math.min(distance / 8000, 1);
  document.getElementById('progressFill').style.width = (prog * 100) + '%';
  document.getElementById('scoreDisplay').textContent = 'WORDS: ' + score;

  const newLevel = Math.min(Math.floor(distance / 2700), 2);
  if (newLevel !== level) {
    level = newLevel;
    document.getElementById('levelLabel').textContent = LEVELS[level].name;
  }

  if (distance >= 8000) {
    win();
  }
}

function rectCollide(a, b) {
  const m = 6;
  return a.x + m < b.x + b.w - m &&
         a.x + a.w - m > b.x + m &&
         a.y + m < b.y + b.h - m &&
         a.y + a.h - m > b.y + m;
}

function rectCollidePoint(rect, px, py) {
  const m = 6;
  return px > rect.x + m && px < rect.x + rect.w - m &&
         py > rect.y + m && py < rect.y + rect.h - m;
}

function die() {
  state = 'dead';
  const poem = deathPoems[Math.floor(Math.random() * deathPoems.length)];
  document.getElementById('deathPoem').textContent = poem;

  let cw = '';
  if (collectedWords.length > 0) {
    cw = 'You gathered: ' + collectedWords.slice(-6).join(' · ');
  }
  document.getElementById('collectedWords').textContent = cw;
  document.getElementById('playBtn').textContent = 'TRY AGAIN';
  document.getElementById('overlay').style.display = 'flex';
}

function win() {
  state = 'win';
  document.getElementById('deathPoem').style.color = '#ffd86b';
  document.getElementById('deathPoem').textContent =
    'You completed the canto!\n' + score + ' words gathered from the air.';
  const poem = collectedWords.length > 0
    ? collectedWords.slice(0, 8).join(', ') + '...'
    : 'silence';
  document.getElementById('collectedWords').textContent = 'Your harvest: ' + poem;
  document.getElementById('playBtn').textContent = 'PLAY AGAIN';
  document.getElementById('overlay').style.display = 'flex';
}

function drawBackground() {
  const lvl = LEVELS[level];
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, lvl.bg[0]);
  grad.addColorStop(1, lvl.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  for (const s of bgStars) {
    const a = s.alpha * (0.5 + 0.5 * Math.sin(s.twinkle));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.fill();
  }

  ctx.save();
  for (const bw of bgWords) {
    ctx.globalAlpha = bw.alpha;
    ctx.fillStyle = lvl.accent;
    ctx.font = `italic ${bw.size}px 'Crimson Text', serif`;
    ctx.fillText(bw.word, bw.x, bw.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawGround() {
  const lvl = LEVELS[level];
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(0, GROUND + 36, W, H - GROUND - 36);

  ctx.strokeStyle = lvl.accent;
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  ctx.moveTo(0, GROUND + 36);
  ctx.lineTo(W, GROUND + 36);
  ctx.stroke();
  ctx.globalAlpha = 1;

  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  for (let x = -groundOffset; x < W; x += 40) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND + 36);
    ctx.lineTo(x + 20, H);
    ctx.stroke();
  }
}

function drawPlayer() {
  const lvl = LEVELS[level];
  ctx.save();
  const cx = player.x + player.w / 2;
  const cy = player.y + player.h / 2;

  for (let i = 1; i < player.trail.length; i++) {
    const t = player.trail[i];
    const alpha = (1 - i / player.trail.length) * 0.25;
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle * Math.PI / 180);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = lvl.accent;
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    ctx.restore();
  }

  ctx.translate(cx, cy);
  ctx.rotate(player.angle * Math.PI / 180);

  ctx.shadowColor = lvl.accent;
  ctx.shadowBlur = 16;

  const r = 5;
  const hw = player.w / 2, hh = player.h / 2;
  ctx.beginPath();
  ctx.moveTo(-hw + r, -hh);
  ctx.lineTo(hw - r, -hh);
  ctx.quadraticCurveTo(hw, -hh, hw, -hh + r);
  ctx.lineTo(hw, hh - r);
  ctx.quadraticCurveTo(hw, hh, hw - r, hh);
  ctx.lineTo(-hw + r, hh);
  ctx.quadraticCurveTo(-hw, hh, -hw, hh - r);
  ctx.lineTo(-hw, -hh + r);
  ctx.quadraticCurveTo(-hw, -hh, -hw + r, -hh);
  ctx.closePath();

  ctx.fillStyle = '#0a0014';
  ctx.fill();
  ctx.strokeStyle = lvl.accent;
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-8, -8); ctx.lineTo(8, -8);
  ctx.moveTo(-8, 0); ctx.lineTo(8, 0);
  ctx.moveTo(-8, 8); ctx.lineTo(8, 8);
  ctx.stroke();

  ctx.font = "bold 9px 'Orbitron', monospace";
  ctx.fillStyle = lvl.accent;
  ctx.textAlign = 'center';
  ctx.fillText('●', 0, 3);

  ctx.restore();
}

function drawObstacles() {
  for (const o of obstacles) {
    ctx.save();
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);

    ctx.shadowColor = '#ff4466';
    ctx.shadowBlur = 10 + pulse * 8;

    const r = 4;
    ctx.beginPath();
    ctx.moveTo(o.x + r, o.y);
    ctx.lineTo(o.x + o.w - r, o.y);
    ctx.quadraticCurveTo(o.x + o.w, o.y, o.x + o.w, o.y + r);
    ctx.lineTo(o.x + o.w, o.y + o.h - r);
    ctx.quadraticCurveTo(o.x + o.w, o.y + o.h, o.x + o.w - r, o.y + o.h);
    ctx.lineTo(o.x + r, o.y + o.h);
    ctx.quadraticCurveTo(o.x, o.y + o.h, o.x, o.y + o.h - r);
    ctx.lineTo(o.x, o.y + r);
    ctx.quadraticCurveTo(o.x, o.y, o.x + r, o.y);
    ctx.closePath();

    ctx.fillStyle = '#1a0010';
    ctx.fill();
    ctx.strokeStyle = `rgba(255,50,80,${0.7 + 0.3 * pulse})`;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.fillStyle = `rgba(255,80,100,${0.8 + 0.2 * pulse})`;
    ctx.font = `italic 13px 'Crimson Text', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(o.word, o.x + o.w / 2, o.y + o.h / 2);
    ctx.restore();
  }
}

function drawCollectables() {
  for (const c of collectables) {
    const by = Math.sin(c.bob) * 5;
    const x = c.x, y = c.y + by;

    ctx.save();
    ctx.shadowColor = '#ffd86b';
    ctx.shadowBlur = 14 + c.glow * 10;

    ctx.beginPath();
    ctx.arc(x + 4, y + 4, 14, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,216,107,0.12)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x + 4, y + 4, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1000';
    ctx.fill();
    ctx.strokeStyle = `rgba(255,216,107,${0.7 + 0.3 * c.glow})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = `rgba(255,216,107,${0.85 + 0.15 * c.glow})`;
    ctx.font = `italic 13px 'Crimson Text', serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.word, x + 4, y + 4);
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.restore();
  }
}

function drawGround2() {
  drawGround();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround2();
  drawCollectables();
  drawObstacles();
  drawPlayer();
  drawParticles();

  const lvl = LEVELS[level];
  const pct = Math.min(distance / 8000, 1);
  ctx.save();
  ctx.fillStyle = lvl.accent;
  ctx.globalAlpha = 0.5;
  ctx.font = "11px 'Orbitron', monospace";
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(Math.floor(pct * 100) + '%', W - 10, 10);
  ctx.restore();
}

let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  if (state === 'playing') {
    update(dt);
    render();
  }
  frameId = requestAnimationFrame(loop);
}

document.getElementById('playBtn').addEventListener('click', () => {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('deathPoem').style.color = 'rgba(255,120,120,0.9)';
  document.getElementById('deathPoem').textContent = '';
  document.getElementById('collectedWords').textContent = '';
  initGame();
  state = 'playing';
  lastTs = performance.now();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

frameId = requestAnimationFrame(loop);

bgWords = generateBgWords();
bgStars = generateStars();
render();
</script>
</body>
</html>
